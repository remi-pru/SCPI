document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
    "<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1\">\n<script src=\"./support.js\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<template id=\"__bundler_thumbnail\">\n<svg viewBox=\"0 0 100 100\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect width=\"100\" height=\"100\" rx=\"16\" fill=\"#0a2540\"/>\n<circle cx=\"50\" cy=\"50\" r=\"20\" fill=\"none\" stroke=\"#4d9bff\" stroke-width=\"9\" stroke-dasharray=\"78 48\" transform=\"rotate(-90 50 50)\"/>\n<circle cx=\"50\" cy=\"50\" r=\"20\" fill=\"none\" stroke=\"#c79a2a\" stroke-width=\"9\" stroke-dasharray=\"30 96\" stroke-dashoffset=\"-78\" transform=\"rotate(-90 50 50)\"/>\n<\u002Fsvg>\n<\u002Ftemplate>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<style>\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{margin:0;padding:0;}\n  body{font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}\n\n  :root,[data-theme=\"light\"]{\n    --bg:#eef1f8;\n    --surface:#ffffff;\n    --surface-2:#f5f7fc;\n    --surface-3:#edf0f8;\n    --ink:#0a2540;\n    --ink-2:#46546d;\n    --ink-3:#8b96a9;\n    --line:#dde3ef;\n    --line-2:#eaecf5;\n    --accent:#1f6feb;\n    --accent-2:#0a2540;\n    --accent-soft:rgba(31,111,235,0.10);\n    --pos:#1a7a53;\n    --neg:#c0492f;\n    --shadow:0 1px 3px rgba(10,37,64,0.06),0 8px 28px rgba(10,37,64,0.08);\n    --shadow-lg:0 2px 6px rgba(10,37,64,0.07),0 18px 50px rgba(10,37,64,0.11);\n    --shadow-sm:0 1px 3px rgba(10,37,64,0.07);\n    --sidebar-w:298px;\n  }\n  [data-theme=\"dark\"]{\n    --bg:#05172a;\n    --surface:#0b2240;\n    --surface-2:#0f2a4e;\n    --surface-3:#13305a;\n    --ink:#e8f0fc;\n    --ink-2:#9db4d0;\n    --ink-3:#647e9c;\n    --line:rgba(255,255,255,0.08);\n    --line-2:rgba(255,255,255,0.05);\n    --accent:#4d9bff;\n    --accent-2:#c8dcff;\n    --accent-soft:rgba(77,155,255,0.14);\n    --pos:#37c08a;\n    --neg:#e07a5f;\n    --shadow:0 1px 3px rgba(0,0,0,0.35),0 12px 36px rgba(0,0,0,0.45);\n    --shadow-lg:0 2px 8px rgba(0,0,0,0.4),0 20px 60px rgba(0,0,0,0.5);\n    --shadow-sm:0 1px 3px rgba(0,0,0,0.35);\n  }\n\n  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:3px;outline:none;cursor:pointer;}\n  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2.5px solid var(--surface);box-shadow:0 1px 5px rgba(0,0,0,.28);cursor:pointer;transition:transform .15s;}\n  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.18);}\n  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer;}\n  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}\n  input[type=number]{-moz-appearance:textfield;}\n  ::selection{background:var(--accent-soft);}\n\n  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}\n  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}\n  @keyframes barGrow{from{width:0}to{width:var(--bar-w,0%)}}\n\n  /* SVG donut segment transitions */\n  .donut-seg{transition:stroke-dasharray .65s cubic-bezier(.4,0,.2,1),stroke-dashoffset .65s cubic-bezier(.4,0,.2,1);}\n\n  /* Bar fill transitions */\n  .bar-fill{transition:width .7s cubic-bezier(.4,0,.2,1);}\n\n  /* Mobile sidebar overlay */\n  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(5,18,40,.55);z-index:40;backdrop-filter:blur(2px);}\n\n  /* Hover states via JS-free CSS */\n  .btn-ghost:hover{border-color:var(--accent)!important;color:var(--accent)!important;}\n  .nav-btn:hover{background:var(--surface-3)!important;}\n  .kpi-card:hover{box-shadow:var(--shadow)!important;transform:translateY(-1px);}\n  .hide-scpi-btn:hover{background:var(--surface-3)!important;color:var(--neg)!important;}\n  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}\n\n  /* Print */\n  @media print{\n    .no-print{display:none!important;}\n    .sidebar{display:none!important;}\n    .sidebar-overlay{display:none!important;}\n    .app-wrap{display:block!important;}\n    main{padding:20px 24px!important;}\n    body{background:#fff!important;}\n    /* Patrimoine historique : masqu\u00e9 en PDF si aucune ligne saisie */\n    .legacy-print-empty{display:none!important;margin:0!important;padding:0!important;}\n    /* \u00c9viter les coupures \u00e0 l'int\u00e9rieur des blocs */\n    .kpi-card{break-inside:avoid;}\n    .bottom-grid{break-inside:avoid;}\n    .bottom-grid > div{break-inside:avoid;}\n    .kpi-grid{break-inside:avoid;}\n    .synth-header{break-inside:avoid;}\n    .detail-metrics{break-inside:avoid;}\n    .detail-geo-grid{break-inside:avoid;}\n    .detail-geo-grid > div{break-inside:avoid;}\n    .detail-sections > div{break-inside:avoid;}\n    .costs-block{break-inside:avoid;}\n    .fsc-results > div{break-inside:avoid;}\n    .income-card{break-inside:avoid;}\n    .detail-hero-body{break-inside:avoid;}\n    /* SCPI detail : hero + m\u00e9triques sur la m\u00eame page */\n    .detail-hero{break-after:avoid;}\n    .detail-metrics{break-before:avoid;}\n    /* Montant \u00e0 investir : restaure 30px sur mobile (> 16px = pas de zoom) */\n    input.main-amount-input{font-size:30px!important;}\n    /* Sliders masqu\u00e9s (non rendus par les navigateurs en mode impression) */\n    input[type=\"range\"]{display:none!important;}\n    /* PDF synth\u00e8se : Pond\u00e9ration seule en page 1, R\u00e9partition+KPI en page 2 */\n    .alloc-grid{grid-template-columns:1fr!important;}\n    .alloc-ponder{break-after:page;}\n    /* Multi-soci\u00e9t\u00e9 : page 3, masqu\u00e9 si 1 seule soci\u00e9t\u00e9 */\n    .co-table-section{break-before:page;}\n    .print-hidden{display:none!important;}\n    /* Patrimoine historique : nouvelle page si donn\u00e9es pr\u00e9sentes */\n    .legacy-section-print{break-before:page;}\n    /* Grilles : layout desktop sur A4 (annule les r\u00e8gles mobile \u00e9ventuelles) */\n    .bottom-grid{grid-template-columns:1fr 1fr 1fr!important;}\n    .kpi-grid{grid-template-columns:repeat(5,1fr)!important;}\n    .detail-geo-grid{grid-template-columns:1fr 1fr!important;}\n    /* Donut : taille r\u00e9duite pour tenir sur A4 sans d\u00e9border */\n    .donut-wrap{width:220px!important;height:220px!important;}\n    .donut-wrap svg{width:220px!important;height:220px!important;}\n    /* Revenu card : pr\u00e9server le d\u00e9grad\u00e9 sombre en PDF couleur */\n    .income-card{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}\n    /* Tables : enl\u00e8ve le min-width fixe pour \u00e9viter les d\u00e9bordements sur A4 */\n    .co-table-wrap{overflow:visible!important;}\n    [data-theme=\"dark\"]{\n      --bg:#fff;--surface:#fff;--surface-2:#f5f5f5;--surface-3:#ebebeb;\n      --ink:#000;--ink-2:#333;--ink-3:#666;--line:#ccc;--line-2:#e5e5e5;\n    }\n  }\n\n  /* Responsive */\n  @media(max-width:820px){\n    /* position:fixed!important est obligatoire : la sidebar a position:sticky en style\n       inline (sp\u00e9cificit\u00e9 plus haute que la classe), ce qui la laissait dans le flux\n       normal et cr\u00e9ait un espace vide de 298px sur la gauche sur mobile. */\n    body{overflow-x:hidden;}\n    .sidebar{\n      position:fixed!important;left:0;top:0;height:100vh;z-index:50;\n      transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);\n    }\n    .sidebar.open{transform:translateX(0);}\n    .sidebar-overlay.open{display:block;}\n    main{padding:20px 16px 70px!important;}\n    .burger-btn{display:flex!important;}\n    .kpi-grid{grid-template-columns:repeat(2,1fr)!important;}\n    .alloc-grid{grid-template-columns:1fr!important;}\n    .bottom-grid{grid-template-columns:1fr!important;}\n    .detail-metrics{grid-template-columns:1fr 1fr!important;}\n    .detail-geo-grid{grid-template-columns:1fr!important;}\n    .detail-sections{grid-template-columns:1fr!important;}\n    .synth-header{flex-direction:column!important;align-items:flex-start!important;}\n    /* H1 : 40px est trop grand sur t\u00e9l\u00e9phone */\n    .synth-header h1{font-size:26px!important;letter-spacing:-0.015em!important;}\n    /* Carte \"Montant \u00e0 investir\" : pleine largeur sur mobile */\n    .synth-header > div:last-child{align-items:stretch!important;width:100%!important;}\n    /* Burger : fix\u00e9 en haut \u00e0 gauche, toujours accessible au scroll */\n    .burger-btn{position:fixed!important;top:16px;left:16px;z-index:35;margin-bottom:0!important;}\n    /* Compense la hauteur du burger fixe */\n    main{padding:70px 16px 70px!important;}\n    /* DIC/PRIIPS : 4 colonnes \u2192 2 colonnes sur mobile */\n    .costs-grid{grid-template-columns:repeat(2,1fr)!important;}\n    /* Barre \"Co\u00fbt total annuel\" : passe en colonne sur mobile */\n    .costs-total{flex-direction:column!important;align-items:flex-start!important;gap:6px!important;}\n    /* Emp\u00eache les grilles de d\u00e9border sur la droite */\n    .detail-geo-grid > div,.detail-sections > div{min-width:0;}\n    /* Vision patrimoniale consolid\u00e9e : 3 colonnes \u2192 1 colonne sur mobile */\n    .consol-grid{grid-template-columns:1fr!important;}\n    .consol-grid > div{min-width:0;}\n    /* Rentabilit\u00e9 nette : 3 colonnes \u2192 1 colonne */\n    .fsc-results{grid-template-columns:1fr!important;}\n    /* Table soci\u00e9t\u00e9s : scroll horizontal si \u00e9cran \u00e9troit */\n    .co-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}\n    /* Inputs : font-size \u2265 16px pour emp\u00eacher le zoom automatique sur iOS */\n    input[type=\"text\"],input[type=\"number\"]{font-size:16px!important;}\n    /* Montant \u00e0 investir : conserve sa grande taille (30px > 16px, pas de zoom) */\n    input.main-amount-input{font-size:30px!important;}\n    /* Pond\u00e9ration : masque le taux de rendement pour lib\u00e9rer l'espace sur chaque ligne */\n    .scpi-rendement{display:none!important;}\n    /* Vignettes alloc-grid : emp\u00eache le contenu de d\u00e9passer la largeur de l'\u00e9cran */\n    .alloc-grid > div{min-width:0;overflow-x:hidden;}\n    /* Donut : taille fluide (\u00e9vite le d\u00e9bordement dans la card) */\n    .donut-wrap{width:min(280px,calc(100% - 4px))!important;height:min(280px,calc(100% - 4px))!important;}\n    .donut-wrap svg{width:100%!important;height:100%!important;}\n    /* Revenu estim\u00e9 : chiffre lisible sans d\u00e9bordement */\n    .income-value{font-size:36px!important;}\n    /* Detail SCPI hero : padding r\u00e9duit + layout colonne sur petit \u00e9cran */\n    .detail-hero{padding:24px 20px!important;}\n    .detail-h1{font-size:28px!important;letter-spacing:-0.015em!important;}\n    .detail-hero-body{flex-direction:column!important;gap:16px!important;}\n    .detail-hero-rate{text-align:left!important;}\n    .detail-rate{font-size:44px!important;}\n  }\n  @media(min-width:821px){\n    .burger-btn{display:none!important;}\n    /* position:sticky g\u00e9r\u00e9 sur desktop uniquement (pas besoin de !important ici\n       car la r\u00e8gle inline est plus sp\u00e9cifique - mais le desktop fonctionne d\u00e9j\u00e0) */\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-theme=\"{{ theme }}\" style=\"min-height:100vh;background:var(--bg);color:var(--ink);\">\n\n  <!-- Mobile overlay -->\n  <div class=\"sidebar-overlay {{ sidebarOverlayClass }}\" onClick=\"{{ closeSidebar }}\"><\u002Fdiv>\n\n  <div class=\"app-wrap\" style=\"display:flex;min-height:100vh;\">\n\n    <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n         SIDEBAR\n    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n    <aside class=\"sidebar {{ sidebarClass }}\" style=\"width:var(--sidebar-w);flex:none;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;box-shadow:var(--shadow);\">\n\n      <!-- Logo -->\n      <div style=\"padding:26px 22px 20px;border-bottom:1px solid var(--line-2);\">\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <div style=\"width:38px;height:38px;border-radius:10px;background:linear-gradient(145deg,var(--accent-2) 0%,#1f6feb 100%);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 2px 10px rgba(31,111,235,.32);\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 20 20\" fill=\"none\">\n              <circle cx=\"10\" cy=\"10\" r=\"7.5\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-dasharray=\"23 24\" transform=\"rotate(-90 10 10)\"/>\n              <circle cx=\"10\" cy=\"10\" r=\"7.5\" stroke=\"rgba(255,255,255,.45)\" stroke-width=\"2.2\" stroke-dasharray=\"12 35\" stroke-dashoffset=\"-23\" transform=\"rotate(-90 10 10)\"/>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Spectral',serif;font-size:17.5px;font-weight:600;letter-spacing:-0.01em;line-height:1.1;\">Allocation SCPI<\u002Fdiv>\n            <div style=\"font-size:10px;color:var(--ink-3);letter-spacing:0.07em;margin-top:2px;text-transform:uppercase;font-weight:600;\">Visualiseur 2026<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Navigation -->\n      <nav style=\"padding:16px 12px;flex:1;overflow-y:auto;\">\n        <div style=\"font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);padding:4px 10px 10px;font-weight:700;\">Portefeuille<\u002Fdiv>\n        <button class=\"nav-btn\" onClick=\"{{ goSynthese }}\" style=\"width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;border-radius:10px;background:{{ syntheseBg }};color:{{ syntheseFg }};cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;text-align:left;margin-bottom:6px;transition:background .15s,color .15s;\">\n          <span style=\"width:18px;height:18px;flex:none;display:flex;align-items:center;justify-content:center;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" opacity=\".8\"><rect x=\"1\" y=\"1\" width=\"5\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.5\"/><rect x=\"8\" y=\"1\" width=\"5\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.5\"/><rect x=\"1\" y=\"8\" width=\"5\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.5\"/><rect x=\"8\" y=\"8\" width=\"5\" height=\"5\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.5\"/><\u002Fsvg>\n          <\u002Fspan>\n          Synth\u00e8se de l'allocation\n        <\u002Fbutton>\n\n        <div style=\"font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);padding:14px 10px 10px;font-weight:700;\">Les 6 SCPI<\u002Fdiv>\n        <sc-for list=\"{{ visibleRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n          <button class=\"nav-btn\" onClick=\"{{ row.onSelect }}\" style=\"width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border:none;border-radius:10px;background:{{ row.navBg }};color:{{ row.navFg }};cursor:pointer;font-family:inherit;text-align:left;margin-bottom:2px;transition:background .15s,color .15s;\">\n            <span style=\"width:8px;height:8px;border-radius:50%;flex:none;background:{{ row.color }};box-shadow:0 0 0 3px {{ row.colorSoft }};\"><\u002Fspan>\n            <span style=\"flex:1;min-width:0;\">\n              <span style=\"display:block;font-size:13px;font-weight:500;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ row.name }}<\u002Fspan>\n              <span style=\"display:block;font-size:11px;color:var(--ink-3);margin-top:1px;\">{{ row.manager }}<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:500;font-variant-numeric:tabular-nums;opacity:.85;\">{{ row.weightStr }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fnav>\n\n      <!-- Sidebar footer -->\n      <div style=\"padding:14px 16px;border-top:1px solid var(--line-2);\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n          <span style=\"font-size:11.5px;color:var(--ink-3);\">Donn\u00e9es 2025<\u002Fspan>\n          <button class=\"btn-ghost no-print\" onClick=\"{{ toggleTheme }}\" style=\"display:flex;align-items:center;gap:6px;padding:6px 11px;border:1px solid var(--line);border-radius:20px;background:var(--surface-2);color:var(--ink-2);cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:500;transition:border-color .15s,color .15s;\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:var(--accent);\"><\u002Fspan>\n            {{ themeLabel }}\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <button class=\"btn-ghost no-print\" onClick=\"{{ exportPdf }}\" style=\"width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);color:var(--ink-2);cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:500;transition:border-color .15s,color .15s,background .15s;\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M7 1v8.5M4 7l3 3 3-3M1.5 11v.5A1.5 1.5 0 003 13h8a1.5 1.5 0 001.5-1.5V11\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>\n          Exporter PDF\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n         MAIN CONTENT\n    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n    <main style=\"flex:1;min-width:0;padding:44px 48px 80px;overflow:auto;\">\n\n      <!-- Burger (mobile only) -->\n      <button class=\"burger-btn no-print\" onClick=\"{{ openSidebar }}\" style=\"align-items:center;gap:8px;padding:9px 14px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink-2);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;margin-bottom:24px;box-shadow:var(--shadow-sm);\">\n        <svg width=\"16\" height=\"13\" viewBox=\"0 0 16 13\" fill=\"none\"><rect y=\".5\" width=\"16\" height=\"2\" rx=\"1\" fill=\"currentColor\"/><rect y=\"5.5\" width=\"12\" height=\"2\" rx=\"1\" fill=\"currentColor\"/><rect y=\"10.5\" width=\"16\" height=\"2\" rx=\"1\" fill=\"currentColor\"/><\u002Fsvg>\n        Menu\n      <\u002Fbutton>\n\n      <!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n           VUE SYNTH\u00c8SE\n      \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n      <sc-if value=\"{{ isSynthese }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"max-width:1160px;margin:0 auto;animation:fadeUp .45s ease both;\">\n\n          <!-- Header -->\n          <div class=\"synth-header\" style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:36px;\">\n            <div>\n              <div style=\"font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:10px;\">Synth\u00e8se strat\u00e9gique<\u002Fdiv>\n              <h1 style=\"font-family:'Spectral',serif;font-size:40px;font-weight:500;letter-spacing:-0.022em;line-height:1.05;margin:0;\">Votre allocation SCPI<\u002Fh1>\n              <p style=\"font-size:14px;color:var(--ink-2);margin:12px 0 0;max-width:500px;line-height:1.62;\">Ajustez la pond\u00e9ration de chaque SCPI. Les indicateurs se recalculent en temps r\u00e9el.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px;align-items:flex-end;\">\n              <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 22px;box-shadow:var(--shadow-sm);\">\n                <div style=\"font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:8px;\">Montant \u00e0 investir<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:5px;\">\n                  <input type=\"text\" value=\"{{ amountInput }}\" onInput=\"{{ onAmount }}\" class=\"main-amount-input\" style=\"width:165px;font-family:'Spectral',serif;font-size:30px;font-weight:500;border:none;background:transparent;color:var(--ink);outline:none;padding:0;\" />\n                  <span style=\"font-family:'Spectral',serif;font-size:30px;color:var(--ink-3);\">\u20ac<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <!-- Sc\u00e9nario pessimiste toggle -->\n              <button class=\"no-print\" onClick=\"{{ togglePessimistic }}\" style=\"display:flex;align-items:center;gap:8px;padding:9px 16px;border:1px solid {{ pessimisticBorderColor }};border-radius:10px;background:{{ pessimisticBg }};color:{{ pessimisticFg }};cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;transition:all .2s;\">\n                <span style=\"width:7px;height:7px;border-radius:50%;background:{{ pessimisticDot }};flex:none;\"><\u002Fspan>\n                {{ pessimisticLabel }}\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Alerte sc\u00e9nario pessimiste -->\n          <div style=\"display:{{ pessimisticBannerDisplay }};background:rgba(192,73,47,0.08);border:1px solid rgba(192,73,47,0.28);border-radius:11px;padding:12px 18px;margin-bottom:18px;align-items:center;gap:12px;\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" style=\"flex:none;\"><circle cx=\"8\" cy=\"8\" r=\"6.5\" stroke=\"#c0492f\" stroke-width=\"1.4\"/><path d=\"M8 5v3.5M8 10.5v.8\" stroke=\"#c0492f\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg>\n            <span style=\"font-size:13px;color:#c0492f;font-weight:500;\">Sc\u00e9nario pessimiste actif - rendements r\u00e9duits de 1 % sur toutes les SCPI<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- Alerte total \u2260 100% -->\n          <div style=\"display:{{ totalAlertDisplay }};background:rgba(192,73,47,0.07);border:1px solid rgba(192,73,47,0.22);border-radius:11px;padding:12px 18px;margin-bottom:18px;align-items:center;gap:12px;animation:pulse 2.5s ease infinite;\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" style=\"flex:none;\"><path d=\"M8 2L1.5 13.5h13L8 2z\" stroke=\"#c0492f\" stroke-width=\"1.4\" stroke-linejoin=\"round\"/><path d=\"M8 7v3M8 11.8v.7\" stroke=\"#c0492f\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg>\n            <span style=\"font-size:13px;color:#c0492f;font-weight:500;\">Somme des pond\u00e9rations : {{ totalStr }} - normalis\u00e9e \u00e0 100 % pour le calcul<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- Grille principale : sliders + donut -->\n          <div class=\"alloc-grid\" style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:22px;align-items:start;margin-bottom:22px;\">\n\n            <!-- Sliders -->\n            <div class=\"alloc-ponder\" style=\"background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:var(--shadow);\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;\">\n                <h2 style=\"font-family:'Spectral',serif;font-size:20px;font-weight:500;margin:0;\">Pond\u00e9ration<\u002Fh2>\n                <div style=\"display:flex;gap:8px;\" class=\"no-print\">\n                  <button class=\"btn-ghost\" onClick=\"{{ onEqual }}\" style=\"padding:7px 13px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);color:var(--ink-2);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:border-color .15s,color .15s;\">\u00c9quipond\u00e9rer<\u002Fbutton>\n                  <button class=\"btn-ghost\" onClick=\"{{ onReset }}\" style=\"padding:7px 13px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);color:var(--ink-2);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:border-color .15s,color .15s;\">R\u00e9initialiser<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <sc-for list=\"{{ visibleRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n                <div style=\"padding:13px 0;border-bottom:1px solid var(--line-2);\">\n                  <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px;\">\n                    <span style=\"width:9px;height:9px;border-radius:50%;flex:none;background:{{ row.color }};\"><\u002Fspan>\n                    <span style=\"flex:1;font-size:13.5px;font-weight:500;cursor:pointer;\" onClick=\"{{ row.onSelect }}\">{{ row.name }}<\u002Fspan>\n                    <span class=\"scpi-rendement\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-3);font-variant-numeric:tabular-nums;\">{{ row.rendementStr }}<\u002Fspan>\n                    <!-- Pourcentage \u00e9ditable -->\n                    <span style=\"display:inline-flex;align-items:center;\">\n                      <input type=\"text\" value=\"{{ row.weightInput }}\" onFocus=\"{{ row.onPctFocus }}\" onInput=\"{{ row.onWeightInput }}\" onBlur=\"{{ row.onPctBlur }}\" onKeyDown=\"{{ row.onPctKeyDown }}\" style=\"width:38px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:var(--ink);border:none;background:transparent;outline:none;text-align:right;padding:0;font-variant-numeric:tabular-nums;\" />\n                      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:var(--ink);margin-left:2px;\">%<\u002Fspan>\n                    <\u002Fspan>\n                    <!-- \u20ac input synchronis\u00e9 -->\n                    <span style=\"display:inline-flex;align-items:center;margin-right:2px;\">\n                      <input type=\"text\" value=\"{{ row.amountEurStr }}\" onFocus=\"{{ row.onEurFocus }}\" onInput=\"{{ row.onAmountInput }}\" onBlur=\"{{ row.onEurBlur }}\" onKeyDown=\"{{ row.onEurKeyDown }}\" style=\"width:68px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-3);border:none;background:transparent;outline:none;text-align:right;padding:0;font-variant-numeric:tabular-nums;\" />\n                      <span s 0e9gende -->\n            <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);\">\n              <h2 style=\"font-family:'Spectral',serif;font-size:20px;font-weight:500;margin:0 0 10px;\">R\u00e9partition<\u002Fh2>\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;\">\n\n                <!-- SVG Donut centr\u00e9 -->\n                <div class=\"donut-wrap\" style=\"position:relative;width:320px;height:320px;flex:none;\">\n                  <svg width=\"320\" height=\"320\" viewBox=\"0 0 100 100\">\n                    <!-- Track -->\n                    <circle cx=\"50\" cy=\"50\" r=\"20\" fill=\"none\" stroke=\"var(--surface-3)\" stroke-width=\"8\"/>\n                    <!-- Segments SCPI 0\u21925 -->\n                    <circle cx=\"50\" cy=\"50\" r=\"20\" fill=\"none\" class=\"donut-seg\"\n                      stroke=\"{{ seg0.color }}\" stroke-width=\"8\"\n                      stroke-dasharray=\"{{ seg0.da }}\" stroke-dashoffset=\"{{ seg0.do }}\"\n                      transform=\"rotate(-90 50 50)\"/>\n                    <circle cx=\"50\" cy=\"50\" r=\"20\" fill=\"none\" class=\"donut-seg\"\n                      stroke=\"{{ seg1.color }}\" stroke-width=\"8\"\n                      stroke-dasharray=\"{{ seg1.da }}\" stroke-dashoffset=\"{{ seg1.do }}\"\n                      transform=\"rotate(-90 50 50)\"/>\n                    <circle cx=\"50\" cy=\"50\" r=\"20\" fill=\"none\" class=\"donut-seg\"\n                      stroke=\"{{ seg2.color }}\" stroke-width=\"8\"\n                      stroke-dasharray=\"{{ seg2.da }}\" stroke-dashoffset=\"{{ seg2.do }}\"\n                      transform=\"rotate(-90 50 50)\"/>\n                    <circle cx=\"50\" cy=\"50\" r=\"20\" fill=\"none\" class=\"donut-seg\"\n                      stroke=\"{{ seg3.color }}\" stroke-width=\"8\"\n                      stroke-dasharray=\"{{ seg3.da }}\" stroke-dashoffset=\"{{ seg3.do }}\"\n                      transform=\"rotate(-90 50 50)\"/>\n                    <circle cx=\"50\" cy=\"50\" r=\"20\" fill=\"none\" class=\"donut-seg\"\n                      stroke=\"{{ seg4.color }}\" stroke-width=\"8\"\n                      stroke-dasharray=\"{{ seg4.da }}\" stroke-dashoffset=\"{{ seg4.do }}\"\n                      transform=\"rotate(-90 50 50)\"/>\n                    <circle cx=\"50\" cy=\"50\" r=\"20\" fill=\"none\" class=\"donut-seg\"\n                      stroke=\"{{ seg5.color }}\" stroke-width=\"8\"\n                      stroke-dasharray=\"{{ seg5.da }}\" stroke-dashoffset=\"{{ seg5.do }}\"\n                      transform=\"rotate(-90 50 50)\"/>\n                    <circle cx=\"50\" cy=\"50\" r=\"16.5\" fill=\"var(--surface)\"/>\n                  <\u002Fsvg>\n                  <!-- Label centr\u00e9 -->\n                  <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;\">\n                    <div style=\"font-family:'Spectral',serif;font-size:22px;font-weight:500;line-height:1;color:var(--ink);\">{{ avgRendementStr }}<\u002Fdiv>\n                    <div style=\"font-size:11px;color:var(--ink-3);letter-spacing:0.04em;text-transform:uppercase;margin-top:7px;text-align:center;line-height:1.5;font-weight:600;\">Rendement<br>moyen<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- L\u00e9gende en grille 2 colonnes -->\n                <div style=\"width:100%;display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;\">\n                  <sc-for list=\"{{ visibleRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n                    <div style=\"display:flex;align-items:center;gap:7px;padding:4px 0;\">\n                      <span style=\"width:7px;height:7px;border-radius:2px;flex:none;background:{{ row.color }};\"><\u002Fspan>\n                      <span style=\"flex:1;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-2);\">{{ row.name }}<\u002Fspan>\n                      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;\">{{ row.pctStr }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- KPI cards -->\n          <div class=\"kpi-grid\" style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;\">\n            <sc-for list=\"{{ kpis }}\" as=\"kpi\" hint-placeholder-count=\"5\">\n              <div class=\"kpi-card\" style=\"background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px 18px 17px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;cursor:default;\">\n                <div style=\"font-size:10px;letter-spacing:0.09em;text-transform:uppercase;color:var(--ink-3);font-weight:700;line-height:1.4;min-height:28px;\">{{ kpi.label }}<\u002Fdiv>\n                <div style=\"font-family:'Spectral',serif;font-size:32px;font-weight:500;margin-top:12px;line-height:1;color:{{ kpi.color }};\">{{ kpi.value }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:var(--ink-3);margin-top:7px;line-height:1.35;\">{{ kpi.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- Rang\u00e9e du bas : revenu + g\u00e9o + sectoriel -->\n          <div class=\"bottom-grid\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;\">\n\n            <!-- Carte revenu estim\u00e9 -->\n            <div class=\"income-card\" style=\"background:linear-gradient(148deg,#0a2540 0%,#163d6a 100%);border-radius:16px;padding:28px;color:#fff;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;\">\n              <div style=\"position:absolute;top:-30px;right:-30px;wid oke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg>\n                  <\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"display:grid;grid-template-columns:1fr 90px 150px 150px 40px;padding:12px 20px;background:var(--surface-2);align-items:center;min-width:500px;\">\n                <span style=\"font-size:13px;font-weight:700;color:var(--ink);\">Total<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:{{ companyTotalColor }};text-align:right;\">{{ companyTotalStr }}<\u002Fspan>\n                <span><\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--ink);text-align:right;\">{{ companyRevenuTotalStr }}<\u002Fspan>\n                <span><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Rentabilit\u00e9 nette apr\u00e8s imp\u00f4t -->\n          <div style=\"margin-top:28px;\">\n            <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:var(--shadow);\">\n              <h2 style=\"font-family:'Spectral',serif;font-size:20px;font-weight:500;margin:0 0 22px;\">Rentabilit\u00e9 nette apr\u00e8s imp\u00f4t<\u002Fh2>\n\n              <!-- S\u00e9lecteur de r\u00e9gime -->\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap;\">\n                <span style=\"font-size:12px;font-weight:600;color:var(--ink-2);\">R\u00e9gime :<\u002Fspan>\n                <button onClick=\"{{ onFscModePropre }}\" style=\"padding:8px 18px;border-radius:9px;border:none;background:{{ fscModePropBg }};color:{{ fscModePropFg }};font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;\">Nom propre<\u002Fbutton>\n                <button onClick=\"{{ onFscModeIS }}\" style=\"padding:8px 18px;border-radius:9px tr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);\n  return 'rgba('+r+','+g+','+b+',0.18)';\n}\n\nfunction mkSeg(color, arc, offset){\n  const da = arc > 0.01\n    ? arc.toFixed(3)+' '+(C_DONUT - arc).toFixed(3)\n    : '0 '+C_DONUT.toFixed(3);\n  return { color, da, do: (-offset).toFixed(3) };\n}\n\nclass Component extends DCLogic {\n  state = {\n    view: 'synthese',\n    theme: 'light',\n    amount: null,\n    weights: (() => {\n      // Poids initiaux calcul\u00e9s \u00e0 partir de parts ENTI\u00c8RES pour le montant par d\u00e9faut (100 000 \u20ac).\n      // \u00c9vite d'afficher des pourcentages qui correspondraient \u00e0 des fractions de parts.\n      const amount = 100000;\n      const defTotal = Object.values(DEFAULT_WEIGHTS).reduce((s,v) => s+v, 0) || 100;\n      const parts = {};\n      let tc = 0;\n      for (const s of SCPI) {\n        if (!s.prix) { parts[s.id] = 0; continue; }\n        const n = Math.floor(amount * (DEFAULT_WEIGHTS[s.id] || 0) / defTotal / s.prix);\n        parts[s.id] = n;\n        tc += n * s.prix;\n      }\n      const w = {};\n      for (const s of SCPI) {\n        w[s.id] = tc > 0 && s.prix\n          ? Math.round(parts[s.id] * s.prix / tc * 10000) / 100\n          : (DEFAULT_WEIGHTS[s.id] || 0);\n      }\n      return w;\n    })(),\n    prevWeights: null,\n    pessimistic: false,\n    sidebarOpen: false,\n    hiddenScpis: {},\n    showHiddenPanel: false,\n    legacy: [],\n    companies: [{name:'Soci\u00e9t\u00e9\u00a01', pct:100}],\n    fiscalite: {mode:'propre', tmi:30, regime:'reel', apport:'cca'}\n  };\n\n  // \u2500\u2500 Buffer d'\u00e9dition (non-r\u00e9actif - hors state) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  // _activeField : 'scpiId-pct' | 'scpiId-eur' | null\n  // _localValue  : cha\u00eene brute saisie par l'utilisateur, sans formatage\n  // Principe : onInput ne fait QUE mettre \u00e0 jour ce buffer.\n  //            Le state global (poids/montant) est mis \u00e0 jour uniquement \u00e0 onBlur / Enter.\n  _activeField = null;\n  _localValue  = '';\n\n  fmtPct(n, d){ if(d===undefined)d=2; return n.toFixed(d).replace('.',',')+'\u202f%'; }\n  fmtEur(n){ return Math.round(n).toLocaleString('fr-FR')+'\u202f\u20ac'; }\n\n  goSynthese    = () => { this.setState({view:'synthese', sidebarOpen:false}); window.scrollTo(0,0); };\n  selectScpi    = (id) => { this.setState({view:id, sidebarOpen:false}); window.scrollTo(0,0); };\n  toggleTheme   = () => this.setState(s=>({theme: s.theme==='light'?'dark':'light'}));\n  setWeight     = (id,val) => this.setState(s=>({weights:{...s.weights,[id]:val}}));\n  setAmount     = (val) => this.setState({amount: isNaN(val)?0:val});\n  equalize      = () => {\n    const st      = this.state;\n    const amount  = st.amount == null ? (this.props.defaultAmount ?? 100000) : st.amount;\n    const visible = SCPI.filter(s => !st.hiddenScpis[s.id] && s.prix > 0);\n    if (!visible.length || !amount) return;\n    // Budget cible identique pour chaque SCPI (\u00e9quipond\u00e9ration brute)\n    const budgetParScpi = amount / visible.length;\n    // Parts enti\u00e8res achetables dans ce budget\n    const parts = {};\n    let tc = 0;\n    for (const s of visible) {\n      const n = Math.floor(budgetParScpi / s.prix);\n      parts[s.id] = n;\n      tc += n * s.prix;\n    }\n    // Poids r\u00e9els en % de l'investi (la somme \u2248 100 %, sans fraction de parts)\n    const w = {...st.weights};\n    for (const s of visible) {\n      w[s.id] = tc > 0\n        ? Math.round(parts[s.id] * s.prix / tc * 10000) / 100\n        : (100 / visible.length);\n    }\n    this.setState({weights: w});\n  };\n  reset = () => {\n    const st     = this.state;\n    const amount = st.amount == null ? (this.props.defaultAmount ?? 100000) : st.amount;\n    if (!amount) { this.setState({weights:{...DEFAULT_WEIGHTS}}); return; }\n    const defTotal = Object.values(DEFAULT_WEIGHTS).reduce((s,v) => s+v, 0) || 100;\n    const defNorm  = id => (DEFAULT_WEIGHTS[id] || 0) / defTotal;\n    // Calcul des parts enti\u00e8res pour chaque SCPI\n    const parts = {};\n    let tc = 0;\n    for (const s of SCPI) {\n      if (!s.prix) { parts[s.id] = 0; continue; }\n      const n = Math.floor(amount * defNorm(s.id) / s.prix);\n      parts[s.id] = n;\n      tc += n * s.prix;\n    }\n    // Poids en % de l'investi r\u00e9el (m\u00eame format que l'optimiseur, sum ~= 100)\n    const w = {};\n    for (const s of SCPI) {\n      w[s.id] = tc > 0 && s.prix\n        ? Math.round(parts[s.id] * s.prix / tc * 10000) / 100\n        : (DEFAULT_WEIGHTS[s.id] || 0);\n    }\n    this.setState({weights: w});\n  };\n  togglePessimistic  = () => this.setState(s=>({pessimistic:!s.pessimistic}));\n  exportPdf          = () => window.print();\n  openSidebar        = () => this.setState({sidebarOpen:true});\n  closeSidebar       = () => this.setState({sidebarOpen:false});\n  hideScpi           = (id) => this.setState(s=>({hiddenScpis:{...s.hiddenScpis,[id]:true}}));\n  showScpi           = (id) => this.setState(s=>{ const h={...s.hiddenScpis}; delete h[id]; return {hiddenScpis:h}; });\n  toggleHiddenPanel  = () => this.setState(s=>({showHiddenPanel:!s.showHiddenPanel}));\n  setAmountEur = (id, eurVal) => {\n    const st = this.state;\n    const amount = st.amount == null ? (this.props.defaultAmount ?? 100000) : st.amount;\n    if(!amount) return;\n    const scpiData = SCPI.find(s => s.id === id);\n    const prix = scpiData ? (scpiData.prix || 0) : 0;\n    // Snap au nombre entier de parts (plancher, pour ne pas d\u00e9passer le budget)\n    const snapped = prix > 0 ? Math.floor(eurVal / prix) * prix : eurVal;\n    const pct = Math.max(0, Math.min(60, (snapped / amount) * 100));\n    this.setWeight(id, Math.round(pct * 100) / 100);\n  };\n\n  optimizeAllocation = () => {\n    const st     = this.state;\n    const amount = st.amount == null ? (this.props.defaultAmount ?? 100000) : st.amount;\n    if (!amount) return;\n    const hiddenScpis = st.hiddenScpis || {};\n    const visibleScpi = SCPI.filter(s => !hiddenScpis[s.id] && s.prix > 0);\n    if (!visibleScpi.length) return;\n\n    const totalCost = p => visibleScpi.reduce((sum, s) => sum + (p[s.id] || 0) * s.prix, 0);\n\n    // Bornes \u00b12 pp absolus depuis une fonction de normalisation\n    const makeBounds = normFn => {\n      const b = {};\n      for (const s of visibleScpi) {\n        const tgt = normFn(s.id);\n        b[s.id] = {\n          min: Math.max(0, Math.ceil(amount * Math.max(0, tgt - 0.05) / s.prix - 1e-9)),\n          max: Math.floor(amount * (tgt + 0.05) / s.prix + 1e-9),\n        };\n      }\n      return b;\n    };\n\n    // Greedy fill : ach\u00e8te en une passe le maximum de parts de chaque SCPI\n    // (ordre d\u00e9croissant de prix), dans la limite n_max\n    const greedyFill = (p, rem, b) => {\n      const r = Object.assign({}, p);\n      let cash = rem;\n      const sorted = [...visibleScpi].sort((x, y) => y.prix - x.prix);\n      for (const s of sorted) {\n        const canBuy = Math.min(\n          Math.floor((cash + 1e-9) / s.prix),\n          Math.max(0, b[s.id].max - r[s.id])\n        );\n        if (canBuy > 0) {\n          r[s.id] += canBuy;\n          cash -= canBuy * s.prix;\n        }\n      }\n      return { p: r, rem: cash };\n    };\n\n    // Une passe : allocation initiale + 100 it\u00e9rations de ventes optimis\u00e9es\n    const runPass = normFn => {\n      const b = makeBounds(normFn);\n\n      let parts = {};\n      for (const s of visibleScpi)\n        parts[s.id] = Math.max(b[s.id].min,\n                      Math.min(b[s.id].max,\n                      Math.floor(amount * normFn(s.id) / s.prix)));\n\n      let cur = greedyFill(parts, amount - totalCost(parts), b);\n\n      for (let iter = 0; iter < 100; iter++) {\n        let bestRem = cur.rem;\n        let bestState = null;\n\n        // Phase A : v  = 1; pass < 4; pass++) {\n      const tc = totalCost(best.p);\n      if (tc <= 0 || best.rem < 1e-6) break;\n      const prevRem = best.rem;\n      // Prix dans un objet pour \u00e9viter find() dans la closure\n      const prixMap = {};\n      for (const s of visibleScpi) prixMap[s.id] = s.prix;\n      normFn = id => (best.p[id] || 0) * (prixMap[id] || 0) / tc;\n      const next = runPass(normFn);\n      if (next.rem >= prevRem - 1e-9) break;\n      best = next;\n    }\n\n    // Recalcul des poids en % de l'investi reel (sum ~= 100)\n    const tc = totalCost(best.p);\n    const newWeights = Object.assign({}, w);\n    for (const s of visibleScpi)\n      newWeights[s.id] = tc > 0 ? Math.round((best.p[s.id] || 0) * s.prix / tc * 10000) / 100 : w[s.id];\n\n    // Top-up : acheter des parts de la SCPI la moins ch\u00e8re pour descendre le reliquat en dessous de son prix de part\n    const computeUnalloc = (weights) => {\n      const wTotal = visibleScpi.reduce((a, s) => a + (weights[s.id] || 0), 0);\n      if (wTotal <= 0) return amount;\n      return Math.max(0, amount - visibleScpi.reduce((sum, s) =>\n        sum + Math.floor(amount * (weights[s.id] || 0) / wTotal / s.prix) * s.prix, 0));\n    };\n    const cheapest = visibleScpi.reduce((a, s) => s.prix < a.prix ? s : a);\n    const wTotalNew = visibleScpi.reduce((a, s) => a + (newWeights[s.id] || 0), 0);\n    const topUpParts = {};\n    for (const s of visibleScpi)\n      topUpParts[s.id] = wTotalNew > 0 ? Math.floor(amount * (newWeights[s.id] || 0) / wTotalNew / s.prix) : 0;\n    const extra = Math.floor((amount - totalCost(topUpParts)) / cheapest.prix);\n    if (extra > 0) {\n      topUpParts[cheapest.id] += extra;\n      const tcTopUp = totalCost(topUpParts);\n      for (const s of visibleScpi)\n        newWeights[s.id] = tcTopUp > 0 ? Math.round((topUpParts[s.id] || 0) * s.prix / tcTopUp * 10000) / 100 : newWeights[s.id];\n    }\n\n    // V\u00e9rification : annuler si le montant non investi apr\u00e8s optimisation n'est pas inf\u00e9rieur au montant initial\n    if (computeUnalloc(newWeights) >= computeUnalloc(w)) return;\n\n    this.setState({ weights: newWeights, prevWeights: w });\n  };\n  undoOptimize = () => this.setState(s => s.prevWeights ? { weights: s.prevWeights, prevWeights: null } : null);\n  addLegacy    = () => this.setState(s=>({legacy:[...s.legacy,{name:'',manager:'',amount:''}]}));\n  removeLegacy = (i) => this.setState(s=>({legacy:s.legacy.filter((_,j)=>j!==i)}));\n  updateLegacy = (i,field,val) => this.setState(s=>{\n    const legacy=[...s.legacy]; legacy[i]={...legacy[i],[field]:val}; return {legacy};\n  });\n  addCompany    = () => this.setState(s=>({companies:[...s.companies,{name:'Soci\u00e9t\u00e9\u00a0'+(s.companies.length+1),pct:0}]}));\n  removeCompany = (i) => this.setState(s=>({companies:s.companies.filter((_,j)=>j!==i)}));\n  updateCompany = (i,f,v) => this.setState(s=>{\n    const companies=[...s.companies]; companies[i]={...companies[i],[f]:v}; return {companies};\n  });\n  setFiscalite  = (f,v) => this.setState(s=>({fiscalite:{...s.fiscalite,[f]:v}}));\n\n  renderVals(){\n    const st = this.state;\n    const amount = st.amount == null ? (this.props.defaultAmount ?? 100000) : st.amount;\n    const w = st.weights;\n\n    const fmtAmt = (n) => Math.round(n).toString().replace(/\\B(?=(\\d{3})+(?!\\d))/g, '\u00a0');\n\n    const hiddenScpis = st.hiddenScpis || {};\n    const visibleScpi = SCPI.filter(s => !hiddenScpis[s.id]);\n    const total = visibleScpi.reduce((a,s)=>a+(w[s.id]||0), 0);\n    const norm = id => !hiddenScpis[id] && total > 0 ? (w[id]||0)/total : 0;\n\n    // Rendement effectif (base ou pessimiste)\n    const rd = s => st.pessimistic ? Math.max(0, s.rendement - 1) : s.rendement;\n\n    // Rows (nav + sliders)\n    const rows = SCPI.map(s=>{\n      const weight   = w[s.id]||0;\n      const pct      = norm(s.id)*100;\n      const active   = st.view === s.id;\n      const isHidden = !!hiddenScpis[s.id];\n      return {\n        id er avec la valeur brute, s\u00e9lectionne tout\n        onPctFocus: (e) => {\n          const raw = weight % 1 === 0 ? String(weight) : weight.toFixed(1).replace('.',',');\n          this._activeField = s.id+'-pct';\n          this._localValue  = raw;\n          e.target.value    = raw;            // enl\u00e8ve le formatage \u00e9ventuel\n          setTimeout(() => e.target.select(), 0);\n        },\n        // Input : buffer + setState temps r\u00e9el. weightInput retourne _localValue \u2192 DCLogic\n        // \u00e9crit la m\u00eame valeur que le DOM \u2192 curseur stable.\n        // Le else force un re-render m\u00eame sur valeur vide/invalide pour que DCLogic\n        // applique weightInput=\"\" et ne restaure pas l'ancien chiffre.\n        onWeightInput: (e) => {\n          this._localValue = e.target.value;\n          const v = parseFloat(e.target.value.replace(',','.'));\n          if(!isNaN(v)) this.setWeight(s.id, Math.max(0, Math.min(60, v)));\n          else this.setState(st => ({weights:{...st.weights}}));\n        },\n        // Blur : valide, applique au state global (d\u00e9clenche le seul re-render autoris\u00e9)\n        onPctBlur: (e) => {\n          const v = parseFloat(this._localValue.replace(',','.'));\n          this._activeField = null;\n          this._localValue  = '';\n          if(!isNaN(v)) this.setWeight(s.id, Math.max(0, Math.min(60, v)));\n          else this.setState(st => ({weights:{...st.weights}})); // re-render pour restaurer\n        },\n        onPctKeyDown: (e) => { if(e.key === 'Enter') e.target.blur(); },\n\n        // \u2500\u2500 Handlers champ \u20ac \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        // Focus : valeur brute sans espaces (ex: \"20000\" au lieu de \
