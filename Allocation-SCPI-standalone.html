tBase = SCPI.reduce((a,s)=>a+norm(s.id)*s.rendement, 0);\n    const avgPga    = SCPI.reduce((a,s)=>a+norm(s.id)*s.pga, 0);\n    const avgTof    = SCPI.reduce((a,s)=>a+norm(s.id)*s.tof, 0);\n    const avgDecote = SCPI.reduce((a,s)=>a+norm(s.id)*s.decote, 0);\n    const avgLtv    = SCPI.reduce((a,s)=>a+norm(s.id)*s.ltv, 0);\n\n    const kpis = [\n      {label:'Rendement moyen (TD)', value:this.fmtPct(avgRendement), sub:'pond\u00e9r\u00e9 par allocation', color:'var(--accent)'},\n      {label:'Performance globale (PGA)', value:this.fmtPct(avgPga), sub:'rendement + revalorisation', color:'var(--ink)'},\n      {label:'Taux d\u2019occupation (TOF)', value:this.fmtPct(avgTof,1), sub:'solidit\u00e9 locative', color:'var(--pos)'},\n      {label:'D\u00e9cote moyenne', value:this.fmtPct(avgDecote), sub:'sous valeur de reconstitution', color:'var(--pos)'},\n      {label:'Endettement (LTV)', value:this.fmtPct(avgLtv), sub:'effet de levier moyen', color:'var(--ink)'}\n    ];\n\n    // SVG Donut : 6 segments nomm\u00e9s (sc-for ne fonctionne pas dans SVG)\n    const segs = []; let acc = 0;\n    SCPI.forEach(s => {\n      const arc = norm(s.id) * C_DONUT;\n      segs.push(mkSeg(s.color, arc, acc));\n      acc += arc;\n    });\n    const [seg0,seg1,seg2,seg3,seg4,seg5] = segs;\n\n    // Agr\u00e9gation g\u00e9o & sectorielle\n    const aggregate = (field) => {\n      const m = {};\n      SCPI.forEach(s => s[field].forEach(e => { m[e.name] = (m[e.name]||0) + norm(s.id)*e.pct; }));\n      return Object.entries(m).map(([name,pct])=>({name,pct})).filter(x=>x.pct>0.05).sort((a,b)=>b.pct-a.pct);\n    };\n    const geoRaw = aggregate('geo');\n    const secRaw = aggregate('buckets');\n    const geoMax = geoRaw.length ? geoRaw[0].pct : 1;\n    const secMax = secRaw.length ? secRaw[0].pct : 1;\n    const geoAgg    = geoRaw.map((g,i)=>({name:g.name, pctStr:g.pct.toFixed(1).replace('.',',')+'\u202f%', width:(g.pct/geoMax*100).toFixed(1)+'%', color:GEO_COLORS[i%GEO_COLORS.length]}));\n    const sectorAgg = secRaw.map((s,i)=>({name:s.name, pctStr:s.pct.toFixed(1).replace('.',',')+'\u202f%', width:(s.pct/secMax*100).toFixed(1)+'%', color:SEC_COLORS[i%SEC_COLORS.length]}));\n\n    // Revenus\n    const incomeAnnual     = amount * avgRendement / 100;\n    const incomeAnnualBase = amount * avgRendementBase / 100;\n    const diffPessimistic  = incomeAnnualBase - incomeAnnual;\n\n    // Revenus par SCPI\n    const incomeBreakdown = visibleScpi.map(s=>({\n      name: s.name, color: s.color,\n      income: amount * norm(s.id) * rd(s) / 100,\n      incomeStr: this.fmtEur(amount * norm(s.id) * rd(s) / 100),\n      pctStr: (norm(s.id)*100).toFixed(0)+'\u00a0%'\n    })).filter(x=>x.income > 0.5);\n\n    // Patrimoine historique\n    const legacyTotal = st.legacy.reduce((a,x)=>a+(parseFloat(x.amount)||0), 0);\n    const grandTotal  = amount + legacyTotal;\n    const consolidatedNewPct = grandTotal > 0 ? (amount / grandTotal * 100).toFixed(1) : '50';\n    const legacyRows  = st.legacy.map((leg,i)=>({\n      ...leg,\n      onNameInput:    (e)=>this.updateLegacy(i,'name',e.target.value),\n      onManagerInput: (e)=>this.updateLegacy(i,'manager',e.target.value),\n      onAmountInput:  (e)=>this.updateLegacy(i,'amount',e.target.value),\n      onRemove:       ()=>this.removeLegacy(i)\n    }));\n\n    // R\u00e9partition multi-soci\u00e9t\u00e9s\n    const companyTotal = st.companies.reduce((a,co)=>a+(parseFloat(co.pct)||0),0);\n    const companyRows  = st.companies.map((comp,i)=>{\n      const pct = parseFloat(comp.pct)||0;\n      const compAmount = amount * pct / 100;\n      const compRevenu = compAmount * avgRendement / 100;\n      return {\n        name: comp.name,\n        pct,\n        amountStr: this.fmtEur(Math.round(compAmount)),\n        revenuStr: this.fmtEur(Math.round(compRevenu)),\n        onNameInput: (e)=>this.updateCompany(i,'name',e.target.value),\n        onPctInput:  (e)=>{\n          const v=parseFloat(e.target.value.replace(',','.'));\n          this.updateCompany(i,'pct',isNaN(v)?0:Math.max(0,Math.min(100,v)));\n        },\n        onRemove: ()=>this.removeCompany(i),\n      };\n    });\n    const companyTotalOk    = Math.abs(companyTotal-100)<0.11;\n    const companyTotalStr   = companyTotal.toFixed(1).replace('.',',')+'\u202f%';\n    const companyTotalColor = companyTotalOk ? 'var(--pos)' : 'var(--neg)';\n\n    // Rentabilit\u00e9 nette apr\u00e8s imp\u00f4t\n    const fsc = st.fiscalite;\n    const fscResult = (()=>{\n      const revenu = incomeAnnual;\n      if(fsc.mode==='propre'){\n        const isMicro = fsc.regime==='micro' && revenu<=15000;\n        const base    = isMicro ? revenu*0.70 : revenu;\n        const ir      = base * (fsc.tmi/100);\n        const ps      = base * 0.172;\n        const impots  = ir + ps;\n        const net     = revenu - impots;\n        return {\n          revenuBrutStr: this.fmtEur(Math.round(revenu)),\n          impotsStr:     this.fmtEur(Math.round(impots)),\n          netStr:        this.fmtEur(Math.round(net)),\n          rendNetStr:    amount>0 ? this.fmtPct(net/amount*100,2) : '0,00\u202f%',\n          tauxStr:       revenu>0 ? (impots/revenu*100).toFixed(0)+'\u202f%' : '0\u202f%',\n          detail:        (isMicro?'Micro-foncier (base 70\u202f%)':'R\u00e9gime r\u00e9el')+' \u00b7 TMI '+fsc.tmi+'\u202f% + PS 17,2\u202f%',\n        };\n      } else {\n        // \u2500\u2500 Calcul IS par soci\u00e9t\u00e9 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        const socs     = (st.companies && st.companies.length > 0) ? st.companies : [{name:'Soci\u00e9t\u00e9 1', pct:100}];\n        const pctSum   = socs.reduce((s,co)=>s+(co.pct||0), 0) || 100;\n        const calcISbracket = base => base <= 0 ? 0 : base <= 42500 ? base*0.15 : 42500*0.15+(base-42500)*0.25;\n        const coData = socs.map(co => {\n          const rev_co      = revenu * ((co.pct||0) / pctSum);\n          const res_co      = Math.max(0, rev_co - 500);\n          const is_co       = calcISbracket(res_co);\n          const netIS_co    = res_co - is_co;\n          const flat_co     = fsc.apport === 'cca' ? 0 : netIS_co * 0.30;\n          const netFinal_co = netIS_co - flat_co;\n          const amount_co = amount * ((co.pct||0) / pctSum);\n          return { name: co.name, pct: co.pct||0, rev_co, res_co, is_co, netIS_co, flat_co, netFinal_co, amount_co };\n        });\n        const fraisTotal  = socs.length * 500;\n        const isTotal     = coData.reduce((s,co)=>s+co.is_co, 0);\n        const flatTotal   = coData.reduce((s,co)=>s+co.flat_co, 0);\n        const netTotal    = coData.reduce((s,co)=>s+co.netFinal_co, 0);\n        const impotsTotal = isTotal + fraisTotal + flatTotal;\n        const nStr        = socs.length > 1 ? socs.length+'x500'+' \u20ac' : '500 \u20ac';\n        if(fsc.apport==='cca'){\n          return {\n            revenuBrutStr: this.fmtEur(Math.round(revenu)),\n            impotsStr:     this.fmtEur(Math.round(isTotal + fraisTotal)),\n            netStr:        this.fmtEur(Math.round(netTotal)),\n            rendNetStr:    amount>0 ? this.fmtPct(netTotal/amount*100,2) : '0,00\u202f%',\n            tauxStr:       revenu>0 ? ((isTotal+fraisTotal)/revenu*100).toFixed(0)+'\u202f%' : '0\u202f%',\n            detail:        'IS par soci\u00e9t\u00e9 (tranche 15'+' %/25 % par entit\u00e9) \u00b7 Frais '+nStr+' \u00b7 Retrait CCA',\n            companiesIS:   coData,\n          };\n        } else {\n          return {\n            revenuBrutStr: this.fmtEur(Math.round(revenu)),\n            impotsStr:     this.fmtEur(Math.round(impotsTotal)),\n            netStr:        this.fmtEur(Math.round(netTotal)),\n            rendNetStr:    amount>0 ? this.fmtPct(netTotal/amount*100,2) : '0,00\u202f%',\n            tauxStr:       revenu>0 ? (impotsTotal/revenu*100).toFixed(0)+'\u202f%' : '0\u202f%',\n            detail:        'IS par soci\u00e9t\u00e9 (tranche 15'+' %/25 % par entit\u00e9) \u00b7 Frais '+nStr+' \u00b7 Flat tax 30 % sur dividendes',\n            companiesIS:   coData,\n          };\n        }\n      }\n    })();\n    // Lignes par soci\u00e9t\u00e9 pour l'affichage d\u00e9taill\u00e9\n    const fscCompaniesRows = fsc.mode === 'is' && fscResult.companiesIS\n      ? fscResult.companiesIS.map(co => ({\n          name:   co.name,\n          revStr: this.fmtEur(Math.round(co.rev_co)),\n          isStr:  this.fmtEur(Math.round(co.is_co)),\n          netStr:  this.fmtEur(Math.round(co.netFinal_co)),\n          rendStr: co.amount_co > 0 ? this.fmtPct(co.netFinal_co / co.amount_co * 100, 2) : '-',\n        }))\n      : null;\n    const showFscCompanies = !!fscCompaniesRows;\n    const fscTmiOptions = [0,11,30,41,45].map(v=>({\n      label: v===0?'0\u202f%':v+'\u202f%',\n      bg:     fsc.tmi===v ? 'var(--accent)'      : 'var(--surface-2)',\n      fg:     fsc.tmi===v ? '#fff'                : 'var(--ink-2)',\n      border: fsc.tmi===v ? 'var(--accent)'       : 'var(--line)',\n      onClick: ()=>this.setFiscalite('tmi',v),\n    }));\n\n    // Vue d\u00e9tail\n    const isDetail = st.view !== 'synthese';\n    let d = {};\n    const cur = SCPI.find(s => s.id === st.view);\n    if(cur){\n      const gmax = Math.max(...cur.geo.map(x=>x.pct));\n      const smax = Math.max(...cur.sectors.map(x=>x.pct));\n      d = {\n        name:cur.name, manager:cur.manager, tagline:cur.tagline,\n        color:cur.color, colorSoft:hexSoft(cur.color),\n        rendementStr: this.fmtPct(cur.rendement),\n        metrics:[\n          {label:'\u00c9chelle de risque (SRI)', value:cur.sri+' / 7', color: cur.sri<=3 ? 'var(--pos)' : (cur.sri<=5 ? '#c79a2a' : 'var(--neg)'), sriDots: Array.from({length:7},(_,i)=>({active:i<cur.sri, col: i<cur.sri ? (cur.sri<=3?'var(--pos)':(cur.sri<=5?'#c79a2a':'var(--neg)')):'var(--line)'}))},\n          {label:'Performance globale (PGA)',    value:this.fmtPct(cur.pga),       color:'var(--ink)'},\n          {label:'Taux d\u2019occupation (TOF)', value:this.fmtPct(cur.tof,2),     color:'var(--pos)'},\n          {label:'D\u00e9cote',                       value:this.fmtPct(cur.decote),    color:'var(--pos)'},\n          {label:'Endettement (LTV)',            value:this.fmtPct(cur.ltv),       color:'var(--ink)'},\n          {label:'Dur\u00e9e des baux (WALB)',        value:cur.walb,                   color:'var(--ink)'},\n          {label:'Report \u00e0 nouveau (RAN)',        value:cur.ran,                    color:'var(--ink)'},\n          {label:'Prix de la part',              value:this.fmtEur(cur.prix),      color:'var(--ink)'},\n          {label:'Valeur de reconstitution',     value:this.fmtEur(cur.vr),        color:'var(--ink)'}\n        ],\n        geo: cur.geo.map((g,i)=>({name:g.name, pctStr:String(g.pct).replace('.',',')+'\u202f%', color:GEO_COLORS[i%GEO_COLORS.length]})),\n        sectors: cur.sectors.map((s,i)=>({name:s.name, pctStr:String(s.pct).replace('.',',')+'\u202f%', color:SEC_COLORS[i%SEC_COLORS.length]})),\n        geoPie: (()=>{ let a=0; return 'conic-gradient('+cur.geo.map((g,i)=>{ const c=GEO_COLORS[i%GEO_COLORS.length],s=a; a+=g.pct; return c+' '+s+'% '+a+'%'; }).join(',')+')'; })(),\n        secPie: (()=>{ let a=0; return 'conic-gradient('+cur.sectors.map((s,i)=>{ const c=SEC_COLORS[i%SEC_COLORS.length],st=a; a+=s.pct; return c+' '+st+'% '+a+'%'; }).join(',')+')'; })(),\n        sections: cur.sections,\n        costs: {\n          entreeStr:      cur.costs.entree.toFixed(2).replace('.',',')+'\u00a0%',\n          sortieStr:      cur.costs.sortie===0 ? 'Non applicable' : cur.costs.sortie.toFixed(2).replace('.',',')+'\u00a0%',\n          sortieNote:     cur.costs.sortieNote || null,\n          gestionStr:     cur.costs.gestion.toFixed(2).replace('.',',')+'\u00a0%',\n          transactionStr: cur.costs.transaction.toFixed(2).replace('.',',')+'\u00a0%',\n          annuelStr:      (cur.costs.gestion+cur.costs.transaction).toFixed(2).replace('.',',')+'\u00a0%'\n        }\n      };\n    }\n\n    const totalOk        = Math.round(total) === 100;\n    const isPessimistic  = st.pessimistic;\n    const sidebarOpen    = st.sidebarOpen;\n\n    return {\n      theme: st.theme,\n      themeLabel: st.theme==='light' ? 'Mode clair' : 'Mode sombre',\n      isSynthese: !isDetail,\n      isDetail,\n      visibleRows, hiddenRows,\n      hiddenSectionDisplay: hiddenRows.length > 0 ? 'flex' : 'none',\n      hiddenPanelDisplay:   st.showHiddenPanel ? 'flex' : 'none',\n      addMoreLabel: st.showHiddenPanel\n        ? '\u25b2 R\u00e9duire'\n        : '+ Ajouter d\\'autres SCPI (' + hiddenRows.length + ')',\n      toggleHiddenPanel: this.toggleHiddenPanel,\n      goSynthese:   this.goSynthese,\n      toggleTheme:  this.toggleTheme,\n      onEqual:      this.equalize,\n      onReset:      this.reset,\n      syntheseBg:   !isDetail ? 'var(--accent-soft)' : 'transparent',\n      syntheseFg:   !isDetail ? 'var(--accent)'      : 'var(--ink-2)',\n      amountInput:  fmtAmt(amount),\n      onAmount:     (e) => this.setAmount(parseFloat(e.target.value.replace(/\\s/g,'').replace(',','.')) || 0),\n      amountStr:    this.fmtEur(amount),\n      kpis,\n      seg0, seg1, seg2, seg3, seg4, seg5,\n      avgRendementStr: this.fmtPct(avgRendement),\n      geoAgg, sectorAgg,\n      incomeAnnualStr:  this.fmtEur(incomeAnnual),\n      incomeMonthlyStr: this.fmtEur(incomeAnnual/12),\n      incomeBreakdown,\n      unallocatedStr, unallocatedColor, showUnallocated: amount > 0,\n      onOptimize: () => this.optimizeAllocation(),\n      showUndo: !!st.prevWeights,\n      onUndo: this.undoOptimize,\n      totalStr:   Math.round(total)+'\u202f%',\n      totalColor: totalOk ? 'var(--pos)' : 'var(--neg)',\n      totalNote:  totalOk ? '\u2713\u202fr\u00e9parti \u00e0 100\u202f%' : 'normalis\u00e9 pour le calcul',\n      totalAlertDisplay:       totalOk ? 'none' : 'flex',\n      isPessimistic,\n      pessimisticBannerDisplay: isPessimistic ? 'flex' : 'none',\n      pessimisticDiffDisplay:   isPessimistic ? 'flex' : 'none',\n      pessimisticLabel:         isPessimistic ? 'Sc\u00e9nario pessimiste (actif)' : 'Sc\u00e9nario pessimiste',\n      pessimisticBg:            isPessimistic ? 'rgba(192,73,47,0.09)' : 'var(--surface-2)',\n      pessimisticFg:            isPessimistic ? '#c0492f' : 'var(--ink-2)',\n      pessimisticBorderColor:   isPessimistic ? 'rgba(192,73,47,0.38)' : 'var(--line)',\n      pessimisticDot:           isPessimistic ? '#c0492f' : 'var(--ink-3)',\n      pessimisticDiff:          this.fmtEur(diffPessimistic),\n      togglePessimistic: this.togglePessimistic,\n      exportPdf:    this.exportPdf,\n      openSidebar:  this.openSidebar,\n      addLegacy:         this.addLegacy,\n      legacyRows,\n      legacyTotal,\n      legacyTotalStr:    this.fmtEur(legacyTotal),\n      grandTotalStr:     this.fmtEur(grandTotal),\n      consolidatedNewPct,\n      legacyPrintClass:  st.legacy.length === 0 ? 'legacy-print-empty' : 'legacy-section-print',\n      coSectionPrintClass: st.companies.length <= 1 ? 'print-hidden' : '',\n      hasLegacy:         st.legacy.length > 0,\n      companyRows, companyTotalStr, companyTotalOk, companyTotalColor,\n      companyRevenuTotalStr: this.fmtEur(Math.round(incomeAnnual)),\n      addCompany: this.addCompany,\n      fscNbSocietes: st.companies.length || 1,\n      fscFraisLabel: st.companies.length > 1 ? (st.companies.length+'\u00d7500') : '500',\n      fscParSocieteLabel: st.companies.length > 1 ? '/soci\u00e9t\u00e9' : '',\n      fscResult, fscCompaniesRows, showFscCompanies, fscTmiOptions,\n      fscIsPropre: fsc.mode==='propre',\n      fscIsIS:     fsc.mode==='is',\n      fscIsCCA:    fsc.apport==='cca',\n      fscIsNum:    fsc.apport==='numeraire',\n      onFscModePropre:  ()=>this.setFiscalite('mode','propre'),\n      onFscModeIS:      ()=>this.setFiscalite('mode','is'),\n      onFscRegimeReel:  ()=>this.setFiscalite('regime','reel'),\n      onFscRegimeMicro: ()=>this.setFiscalite('regime','micro'),\n      onFscApportCCA:   ()=>this.setFiscalite('apport','cca'),\n      onFscApportNum:   ()=>this.setFiscalite('apport','numeraire'),\n      fscModePropBg:fsc.mode==='propre'?'var(--accent)':'var(--surface-2)',\n      fscModePropFg:fsc.mode==='propre'?'#fff':'var(--ink-2)',\n      fscModeISBg:  fsc.mode==='is'?'var(--accent)':'var(--surface-2)',\n      fscModeISFg:  fsc.mode==='is'?'#fff':'var(--ink-2)',\n      fscReelBg:    fsc.regime==='reel'?'var(--accent-soft)':'var(--surface-2)',\n      fscReelFg:    fsc.regime==='reel'?'var(--accent)':'var(--ink-2)',\n      fscReelBorder:fsc.regime==='reel'?'var(--accent)':'var(--line)',\n      fscMicroBg:   fsc.regime==='micro'?'var(--accent-soft)':'var(--surface-2)',\n      fscMicroFg:   fsc.regime==='micro'?'var(--accent)':'var(--ink-2)',\n      fscMicroBorder:fsc.regime==='micro'?'var(--accent)':'var(--line)',\n      fscCCABg:     fsc.apport==='cca'?'var(--accent-soft)':'var(--surface-2)',\n      fscCCAFg:     fsc.apport==='cca'?'var(--accent)':'var(--ink-2)',\n      fscCCABorder: fsc.apport==='cca'?'var(--accent)':'var(--line)',\n      fscNumBg:     fsc.apport==='numeraire'?'var(--accent-soft)':'var(--surface-2)',\n      fscNumFg:     fsc.apport==='numeraire'?'var(--accent)':'var(--ink-2)',\n      fscNumBorder: fsc.apport==='numeraire'?'var(--accent)':'var(--line)',\n      closeSidebar: this.closeSidebar,\n      sidebarClass:        sidebarOpen ? 'open' : '',\n      sidebarOverlayClass: sidebarOpen ? 'open' : '',\n      d\n    };\n  }\n}\n<\u002Fscript>\n<\u002Fbody>\n<\u002Fhtml>\n"
  </script>
